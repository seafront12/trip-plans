<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trip Plan</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; line-height: 1.7; color: #333; }
    a.back { display: inline-block; margin-bottom: 20px; color: #0070f3; text-decoration: none; }
    a.back:hover { text-decoration: underline; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
    th { background: #f5f5f5; }
    tr:nth-child(even) { background: #fafafa; }
    h1, h2, h3 { color: #111; }
    hr { border: none; border-top: 1px solid #eee; margin: 1.5em 0; }
    code { background: #f0f0f0; padding: 2px 5px; border-radius: 3px; }
    pre { background: #f0f0f0; padding: 12px; border-radius: 5px; overflow-x: auto; }
    #error { color: red; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back to Trip Plans</a>
  <div id="content">Loading...</div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    if (!file) {
      document.getElementById('content').innerHTML = '<p id="error">No file specified.</p>';
    } else {
      document.title = file.replace(/\.md$/, '').replace(/_/g, ' ');
      fetch(file)
        .then(r => {
          if (!r.ok) throw new Error('File not found');
          return r.text();
        })
        .then(text => {
          document.getElementById('content').innerHTML = marked.parse(text);
        })
        .catch(err => {
          document.getElementById('content').innerHTML = '<p id="error">Could not load file: ' + err.message + '</p>';
        });
    }
  </script>
</body>
</html>
